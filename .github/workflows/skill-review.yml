name: Skill Review

on:
  pull_request:
    paths:
      - '**/SKILL.md'
  workflow_dispatch:

# Prevent duplicate/racing runs per PR.
concurrency:
  group: skill-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

# Default least-privilege; job-specific permissions below.
permissions:
  contents: read

jobs:
  detect-skills:
    name: Detect changed skills
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.changed.outputs.skills }}
      has_skills: ${{ steps.changed.outputs.has_skills }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed skill directories
        id: changed
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import subprocess

          base = os.environ["BASE_SHA"]
          head = os.environ["HEAD_SHA"]

          # Use base...head to properly diff against merge-base.
          out = subprocess.check_output(
              ["git", "diff", "--name-only", f"{base}...{head}"],
              text=True,
          )

          # Store the directory that *contains* SKILL.md (supports **/SKILL.md).
          skills = sorted({os.path.dirname(p) for p in out.splitlines() if p.endswith("SKILL.md")})
          print(f"skills={json.dumps(skills)}")
          print(f"has_skills={'true' if skills else 'false'}")
          PY

  validate:
    name: "skills-ref → ${{ matrix.skill }}"
    needs: detect-skills
    if: needs.detect-skills.outputs.has_skills == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.detect-skills.outputs.skills) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install skills-ref
        run: python -m pip install --upgrade pip skills-ref

      - name: Validate skill
        run: skills-ref validate "${{ matrix.skill }}"

  review:
    name: "${{ matrix.reviewer }} → ${{ matrix.skill }}"
    needs: [detect-skills, validate]
    # Skip when no skills changed OR secrets aren't available (common on fork PRs).
    if: needs.detect-skills.outputs.has_skills == 'true' && secrets.GATEWAY_API_KEY != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        reviewer:
          - skill-reviewer
          - mgechev-skill-reviewer
          - codex-skill-reviewer
          - ms-agent-skill-reviewer
          - agentskills-skill-reviewer
          - claude-skill-reviewer
        skill: ${{ fromJson(needs.detect-skills.outputs.skills) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Prepare skill name
        id: meta
        shell: bash
        run: echo "skill_name=$(basename '${{ matrix.skill }}')" >> "$GITHUB_OUTPUT"

      - name: Stagger API requests
        shell: bash
        run: |
          DELAY=$(( 5 + RANDOM % 40 ))
          echo "Waiting ${DELAY}s to stagger API calls..."
          sleep "$DELAY"

      - name: Run reviewer
        id: run_reviewer
        env:
          AI_GATEWAY_URL: ${{ secrets.AI_GATEWAY_URL }}
          GATEWAY_API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
        shell: bash
        run: |
          OUT="review-${{ steps.meta.outputs.skill_name }}-${{ matrix.reviewer }}.md"
          python .github/scripts/review-skill.py \
            --agent ".github/agents/${{ matrix.reviewer }}.agent.md" \
            --skill "${{ matrix.skill }}" \
            --provider "$LLM_PROVIDER" \
            --output "$OUT"
          echo "out=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: "review-${{ steps.meta.outputs.skill_name }}-${{ matrix.reviewer }}"
          path: ${{ steps.run_reviewer.outputs.out }}
          retention-days: 7

  judge:
    name: LLM-as-Judge
    needs: [detect-skills, validate, review]
    # Skip when no skills changed OR secrets aren't available (common on fork PRs).
    if: needs.detect-skills.outputs.has_skills == 'true' && secrets.GATEWAY_API_KEY != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Download all review artifacts
        uses: actions/download-artifact@v4
        with:
          path: reviews/
          pattern: "review-*"
          merge-multiple: true

      - name: Verify downloaded reviews
        shell: bash
        run: |
          ls -la reviews || true
          test -n "$(find reviews -type f -name '*.md' -print -quit)"

      - name: Aggregate reviews
        env:
          AI_GATEWAY_URL: ${{ secrets.AI_GATEWAY_URL }}
          GATEWAY_API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
        run: |
          python .github/scripts/judge-reviews.py \
            --reviews-dir reviews/ \
            --provider "$LLM_PROVIDER" \
            --output aggregated-review.md

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('aggregated-review.md', 'utf8');
            const marker = '<!-- skill-review-bot -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            const fullBody = `${marker}\n\n${body}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
